<svg xmlns="http://www.w3.org/2000/svg">
    <!--Значки-->
    <symbol id="x" viewBox="0 0 24 24">
        <path d="M6 6L18 18M18 6L6 18"/>
    </symbol>
    <symbol id="o" viewBox="0 0 24 24">
        <path d="M4.06189 13C4.02104 12.6724 4 12.3387 4 12C4 7.58172 7.58172 4 12 4C14.5006 4 16.7332 5.14727 18.2002 6.94416M19.9381 11C19.979 11.3276 20 11.6613 20 12C20 16.4183 16.4183 20 12 20C9.61061 20 7.46589 18.9525 6 17.2916M9 17H6V17.2916M18.2002 4V6.94416M18.2002 6.94416V6.99993L15.2002 7M6 20V17.2916"/>
    </symbol>
    <symbol id="v" viewBox="0 0 24 24">
        <line x1="12" y1="4" x2="12" y2="20"/>
    </symbol>

    <!--Страницы-->
    <symbol id="main" viewBox="0 0 24 24">
        <line x1="3" y1="4" x2="21" y2="4"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="20" x2="21" y2="20"/>
    </symbol>
    <symbol id="cutting" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="10" y1="1" x2="10" y2="23"/>
        <line x1="10" y1="10" x2="23" y2="10"/>
    </symbol>
    <symbol id="setting" viewBox="0 0 24 24">
        <line x1="3" y1="2" x2="3" y2="22"/>
        <rect x="8" y="3" width="14" height="6" rx="2" ry="2"/>
        <rect x="8" y="14" width="10" height="7" rx="2" ry="2"/>
    </symbol>

    <!--Меню-->
    <symbol id="right" viewBox="0 0 24 24">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <polyline points="14 19 21 12 14 5"/>
    </symbol>
    <symbol id="left" viewBox="0 0 24 24">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <polyline points="10 19 3 12 10 5"/>
    </symbol>

    <!--Кнопки-->
    <symbol id="remove" viewBox="0 0 24 24">
        <path d="M 2.4 6 H 21.6"/>
        <path d="M 4.8 6 V 19.2 C 4.8 21.19, 6.41 22.8, 8.4 22.8 H 15.6 C 17.59 22.8, 19.2 21.19, 19.2 19.2 V 6"/>
        <path d="M 8.4 3.6 C 8.4 2.27, 9.47 1.2, 10.8 1.2 H 13.2 C 14.53 1.2, 15.6 2.27, 15.6 3.6 V 6 H 8.4 V 3.6 Z"/>
    </symbol>
    <symbol id="download" viewBox="0 0 24 24">
        <path d="M2 15.333 C2 18.48 2 20.05 2.98 21.02 C3.95 22 5.52 22 8.667 22 H15.333 C18.48 22 20.05 22 21.02 21.02 C22 20.05 22 18.48 22 15.333"/>
        <path d="M12 2 V15 M12 15 L8 12 M12 15 L16 12"/>
    </symbol>

    <!--Формы-->
    <symbol id="cancel" viewBox="0 0 24 24">
        <path d="M4 4L20 20M20 4L4 20"/>
    </symbol>
    <symbol id="recover" viewBox="0 0 24 24">
        <path d="M12 5a8 8 0 1 0 8 8"/>
        <path d="M9 1.5L14 4.5L11.5 9.5"/>
    </symbol>
    <symbol id="save" viewBox="0 0 24 24">
        <path d="M2 12L10 20L22 2"/>
    </symbol>
    <symbol id="plus" viewBox="0 0 24 24">
        <line x1="12" y1="2" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
    </symbol>
    <symbol id="create" viewBox="0 0 24 24">
        <line x1="12" y1="4" x2="12" y2="20"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
    </symbol>

    <!--Кромки-->
    <symbol id="line" viewBox="0 0 60 5">
        <line x1="2" y1="3" x2="58" y2="3"/>
    </symbol>
    <symbol id="dash" viewBox="0 0 60 5">
        <line x1="2" y1="3" x2="58" y2="3" stroke-dasharray="8 8"/>
    </symbol>
    <symbol id="wave" viewBox="0 0 60 5">
        <path d="M 2 3
               Q 5 2, 7 2
               Q 10 2, 12 3
               Q 14 4, 17 4
               Q 20 4, 22 3
               Q 25 2, 27 2
               Q 30 2, 32 3
               Q 35 4, 37 4
               Q 40 4, 42 3
               Q 45 2, 47 2
               Q 50 2, 52 3
               Q 55 4, 57 4
               L 58 4"
        />
    </symbol>

    <!--Редактор-->
    <symbol id="rotate" viewBox="0 0 24 24">
        <path transform="translate(-3, -3)"
              d="M5.0774 16.25C5.0263 15.8405 5.0 15.4234 5.0 15.0C5.0 9.4771 9.4771 5.0 15.0 5.0C18.1258 5.0 20.9165 6.4341 22.7502 8.6802M24.9226 13.75C24.9737 14.1595 25.0 14.5766 25.0 15.0C25.0 20.5229 20.5229 25.0 15.0 25.0C12.0133 25.0 9.3324 23.6906 7.5 21.6145M11.25 21.25H7.5V21.6145M22.7502 5.0V8.6802M22.7502 8.6802V8.7499L19.0003 8.75M7.5 25.0V21.6145"/>
    </symbol>
    <symbol id="direction" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="10" y1="1" x2="10" y2="23"/>
    </symbol>

    <symbol id="clear" viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="2" ry="2"/>
    </symbol>

    <symbol id="cut" viewBox="0 0 24 24">
        <rect x="3" y="3" width="6" height="18" rx="2" ry="2"/>
        <rect x="13" y="3" width="10" height="6" rx="2" ry="2"/>
        <rect x="13" y="13" width="10" height="8" rx="2" ry="2"/>
    </symbol>

    <!--Реакции-->
    <symbol id="happy" viewBox="0 0 24 24">
        <circle cx="7" cy="4" r="1"/>
        <circle cx="17" cy="4" r="1"/>
        <path d="M 2 16 Q 12 11 22 16"/>
    </symbol>
    <symbol id="sad" viewBox="0 0 24 24">
        <circle cx="7" cy="4" r="1"/>
        <circle cx="17" cy="4" r="1"/>
        <path d="M 2 13 Q 12 18 22 13"/>
    </symbol>

    <symbol id="sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <g transform="translate(12,12)">
            <g>
                <line x1="0" y1="-11" x2="0" y2="-9" transform="rotate(0)"/>
                <line x1="0" y1="-11" x2="0" y2="-9" transform="rotate(60)"/>
                <line x1="0" y1="-11" x2="0" y2="-9" transform="rotate(120)"/>
                <line x1="0" y1="-11" x2="0" y2="-9" transform="rotate(180)"/>
                <line x1="0" y1="-11" x2="0" y2="-9" transform="rotate(240)"/>
                <line x1="0" y1="-11" x2="0" y2="-9" transform="rotate(300)"/>
            </g>
        </g>
    </symbol>
    <symbol id="moon" viewBox="0 0 24 24">
        <path d="M9 6C9 10.9706 13.0294 15 18 15C18.9093 15 19.787 14.8655 20.6144 14.6147C19.4943 18.3103 16.0613 20.9999 12 20.9999C7.02944 20.9999 3 16.9707 3 12.0001C3 7.93883 5.69007 4.50583 9.38561 3.38574C9.13484 4.21311 9 5.09074 9 6Z"/>
    </symbol>
</svg>

