<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            border: none;
        }

        #print {
        }

        .page {
            page-break-before: always;
            position: relative;
        }

        .cutting {
            background: #3fa883;
            print-color-adjust: exact;
            -webkit-print-color-adjust: exact;

            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left bottom;
            transform: translateY(-100%) rotate(90deg);
            width: 100vh;
            height: calc(100vw - 3cm);

            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            gap: 1cm;
        }

        .sign {
            position: fixed;
            top: 0;
            right: 0;
            transform-origin: right top;
            transform: rotate(90deg) translateX(100%) translateY(2cm);
            width: 277mm;
            height: 1px;
            border-bottom: 1px solid gray;
        }

        @media print {
            @page {
                margin: 1cm 0 1cm 1cm;
                size: A4;
            }

            @page {
                @top-center {
                    content: none;
                }
                @bottom-center {
                    content: none;
                }
            }

            body {
                margin-right: 3cm;
            }

            body * {
                visibility: hidden;
            }

            body > *:not(#print) {
                display: none;
            }

            #print {
                display: flex;
                flex-direction: column;
                gap: 1cm;
            }

            #print, #print * {
                color: black;
                visibility: visible;
            }
        }

        .drop {
            width: 10cm;
            height: 5cm;
            border: 1px solid red;
        }

        .take {
            height: 10cm;
            width: 5cm;
            border: 1px solid green;
        }
    </style>
</head>
<body>

<div id="print">
    <div class="sign"></div>

    <div class="page">
        <div class="cutting">
            <div class="drop"></div>
            <div class="take"></div>
        </div>
    </div>
    <div class="page">
        <div class="cutting">
            <div class="drop"></div>
            <div class="take"></div>
        </div>
    </div>
</div>

</body>
</html>
