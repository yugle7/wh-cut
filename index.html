<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Раскрой</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
<article id="main" class="content">
    <button id="create-task">Создать раскрой</button>
    <ol id="tasks"></ol>
</article>

<article id="setting" class="hidden">
    <div id="to-remove-task" class="hidden">
        <div>Вы действительно</div>
        <div>хотите удалить задание?</div>
        <h1></h1>
        <div>
            <button id="yes-remove-task">Да</button>
            <button id="no-remove-task">Нет</button>
        </div>
    </div>
    <div id="output">
        <div id="to-update-task"></div>
        <button class="out" id="to-update-sheet"></button>

        <br>
        <button class="out" id="to-create-scrap">
            <span class="big pad">Обрезки</span>
            <svg class="yellow">
                <use href="sprite.svg#plus"></use>
            </svg>
        </button>
        <ol id="scraps"></ol>

        <br>
        <button class="out" id="to-create-edging">
            <span class="big pad">Кромки</span>
            <svg class="yellow">
                <use href="sprite.svg#plus"></use>
            </svg>
        </button>
        <ol id="edgings"></ol>

        <br>
        <button class="out" id="to-create-piece">
            <span class="big pad">Детали</span>
            <svg class="yellow">
                <use href="sprite.svg#plus"></use>
            </svg>
        </button>
        <ol id="pieces"></ol>
        <br>
        <button id="remove-task" class="eye">
            Удалить задание
        </button>

        <nav>
            <button id="to-main">
                <svg class="green">
                    <use href="sprite.svg#left"></use>
                </svg>
            </button>
            <button id="to-cutting">
                <svg class="yellow">
                    <use href="sprite.svg#cutting"></use>
                </svg>
            </button>
            <button id="change-theme">
                <svg class="hidden">
                    <use href="sprite.svg#sun"></use>
                </svg>
                <svg class="hidden">
                    <use href="sprite.svg#moon"></use>
                </svg>
            </button>
        </nav>
    </div>

    <div id="input" class="hidden">
        <form id="task" class="hidden">
            <section class="out">
                <label for="task-title" class="hidden">Название задачи</label>
                <input type="text" id="task-title" placeholder="Название задачи"/>
            </section>
            <section class="out">
                <label for="task-start">Дата</label>
                <input type="date" id="task-start"/>
            </section>
            <section class="out">
                <label for="task-finish">Дата готовности</label>
                <input type="date" id="task-finish"/>
            </section>
            <section class="out">
                <label for="task-material" class="hidden">Материал листа</label>
                <input type="text" id="task-material" placeholder="Материал листа"/>
            </section>
            <section class="out">
                <label for="task-thick">Толщина листа</label>
                <input type="number" inputmode="numeric" id="task-thick" placeholder="мм"/>
            </section>
        </form>

        <form id="sheet" class="hidden">
            <section class="out">
                <span>Размеры листа</span>
                <div class="center">
                    <label>
                        <input type="number" inputmode="numeric" id="sheet-width" placeholder="длина"
                               autocomplete="off"/>
                    </label>
                    <svg class="icon">
                        <use href="sprite.svg#x"></use>
                    </svg>
                    <label>
                        <input type="number" inputmode="numeric" id="sheet-height" placeholder="ширина"
                               autocomplete="off"/>
                    </label>
                </div>
            </section>
            <section class="out">
                <label for="sheet-edge">Отступ от края</label>
                <input type="number" inputmode="numeric" id="sheet-edge" placeholder="мм" autocomplete="off"/>
            </section>
            <section class="out">
                <label for="task-kerf">Ширина реза</label>
                <input type="number" inputmode="numeric" id="task-kerf" placeholder="мм"/>
            </section>
        </form>

        <form id="scrap" class="hidden">
            <section class="out">
                <span>Размеры</span>
                <div>
                    <label>
                        <input type="number" inputmode="numeric" id="scrap-width" placeholder="длина"
                               autocomplete="off"/>
                    </label>
                    <svg class="icon">
                        <use href="sprite.svg#x"></use>
                    </svg>
                    <label>
                        <input type="number" inputmode="numeric" id="scrap-height" placeholder="ширина"
                               autocomplete="off"/>
                    </label>
                </div>
            </section>
            <section class="out">
                <label for="scrap-edge">Отступ от края</label>
                <input type="number" inputmode="numeric" id="scrap-edge" placeholder="мм" autocomplete="off"/>
            </section>
            <section class="out">
                <label for="scrap-count">Количество</label>
                <input type="number" inputmode="numeric" id="scrap-count" placeholder="шт" autocomplete="off"/>
            </section>
        </form>

        <form id="edging" class="hidden">
            <section class="out">
                <label for="edging-line">Линия</label>
                <button id="edging-line"></button>
            </section>
            <section class="out">
                <label for="edging-thick">Толщина</label>
                <input type="number" inputmode="numeric" step="0.1" id="edging-thick" placeholder="мм"
                       autocomplete="off"/>
            </section>
        </form>

        <form id="piece" class="hidden">
            <section class="out">
                <span>Размеры</span>
                <div>
                    <label>
                        <input type="number" inputmode="numeric" id="piece-width" placeholder="длина"
                               autocomplete="off"/>
                    </label>
                    <svg class="icon" id="piece-rotate">
                        <use href="sprite.svg#x"></use>
                    </svg>
                    <label>
                        <input type="number" inputmode="numeric" id="piece-height" placeholder="ширина"
                               autocomplete="off"/>
                    </label>
                </div>
            </section>
            <section class="out">
                <label for="piece-rotated">Можно вращать</label>
                <button id="piece-rotated"></button>
            </section>
            <section class="out">
                <label for="piece-count">Количество</label>
                <input type="number" inputmode="numeric" id="piece-count" placeholder="шт" autocomplete="off"/>
            </section>
            <section class="out">
                <label for="piece-edging-up">Кромка сверху</label>
                <button id="piece-edging-up"></button>
            </section>
            <section class="out">
                <label for="piece-edging-down">Кромка снизу</label>
                <button id="piece-edging-down"></button>
            </section>
            <section class="out">
                <label for="piece-edging-left">Кромка слева</label>
                <button id="piece-edging-left"></button>
            </section>
            <section class="out">
                <label for="piece-edging-right">Кромка справа</label>
                <button id="piece-edging-right"></button>
            </section>
        </form>

        <nav>
            <button id="remove">
                <svg class="red">
                    <use href="sprite.svg#cancel"></use>
                </svg>
            </button>
            <button id="recover" class="hidden">
                <svg class="gray">
                    <use href="sprite.svg#recover"></use>
                </svg>
            </button>

            <div class="space"></div>

            <button id="prev" class="hidden">
                <svg class="blue">
                    <use href="sprite.svg#left"></use>
                </svg>
            </button>
            <button id="create" class="hidden">
                <svg class="yellow">
                    <use href="sprite.svg#create"></use>
                </svg>
            </button>
            <button id="next" class="hidden">
                <svg class="blue">
                    <use href="sprite.svg#right"></use>
                </svg>
            </button>

            <div class="space"></div>

            <button id="update">
                <svg class="green">
                    <use href="sprite.svg#save"></use>
                </svg>
            </button>
        </nav>
    </div>
</article>


<article id="cutting" class="hidden">
    <div id="drop"></div>
    <div id="gutter"></div>
    <div class="wrapper">
        <div id="take"></div>
    </div>

    <nav>
        <button id="to-setting">
            <svg class="yellow">
                <use href="sprite.svg#left"></use>
            </svg>
        </button>
        <button id="download-cutting">
            <svg class="green">
                <use href="sprite.svg#download"></use>
            </svg>
        </button>
        <button id="rotate-piece">
            <svg>
                <use href="sprite.svg#rotate"></use>
            </svg>
        </button>
        <button id="cut-direction" class="tools">
            <svg>
                <use href="sprite.svg#direction"></use>
            </svg>
        </button>

        <button id="cut">
            <svg>
                <use href="sprite.svg#cut"></use>
            </svg>
        </button>
        <button id="clear">
            <svg>
                <use href="sprite.svg#clear"></use>
            </svg>
        </button>
    </nav>

</article>

<div id="print"></div>

<button id="do-cut" class="hidden">
    Улучшить раскрой
</button>

<script src="script.js"></script>

</body>
</html>
